name: Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  deploy-backend:
    if: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER != '' && secrets.GCP_SERVICE_ACCOUNT != '' && secrets.GCP_PROJECT_ID != '' }}
    runs-on: ubuntu-latest
    outputs:
      backend_url: ${{ steps.describe.outputs.backend_url }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Configure Docker auth
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet
      - name: Build and push backend image
        run: |
          gcloud builds submit backend \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --tag "us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GCP_ARTIFACT_REPOSITORY }}/election-copilot-api:${{ github.sha }}"
      - name: Deploy Cloud Run service
        run: |
          gcloud run deploy "${{ secrets.CLOUD_RUN_SERVICE }}" \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --image "us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GCP_ARTIFACT_REPOSITORY }}/election-copilot-api:${{ github.sha }}" \
            --region "${{ secrets.CLOUD_RUN_REGION }}" \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars "GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }},GEMINI_MODEL=${{ secrets.GEMINI_MODEL }},FRONTEND_ORIGINS=${{ secrets.FRONTEND_ORIGINS }},APP_AUTH_SECRET=${{ secrets.APP_AUTH_SECRET }},PUBLIC_CLIENT_ID=${{ secrets.PUBLIC_CLIENT_ID }}"
      - id: describe
        name: Capture backend URL
        run: |
          URL=$(gcloud run services describe "${{ secrets.CLOUD_RUN_SERVICE }}" \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --region "${{ secrets.CLOUD_RUN_REGION }}" \
            --format='value(status.url)')
          echo "backend_url=$URL" >> "$GITHUB_OUTPUT"

  deploy-frontend:
    if: ${{ secrets.VERCEL_TOKEN != '' && secrets.VERCEL_ORG_ID != '' && secrets.VERCEL_PROJECT_ID != '' }}
    needs: [deploy-backend]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Prepare production env
        run: echo "NEXT_PUBLIC_API_URL=${{ needs.deploy-backend.outputs.backend_url || secrets.PRODUCTION_API_URL }}" > .env.production.local
      - name: Install Vercel CLI
        run: npm install --global vercel
      - name: Pull Vercel settings
        run: vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      - name: Build frontend
        run: vercel build --prod --token="${{ secrets.VERCEL_TOKEN }}"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      - name: Deploy frontend
        run: vercel deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
